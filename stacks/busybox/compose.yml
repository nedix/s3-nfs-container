services:
  s3-nfs:
    image: nedix/s3-nfs
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse:rwm
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "127.0.0.1:${FORWARD_S3_NFS_PORT}:2049"

  example-container:
    image: busybox
    volumes:
      - s3-nfs:/data
    depends_on:
      s3-nfs:
        condition: service_healthy

volumes:
  s3-nfs:
    driver_opts:
      type: 'nfs'
      o: "vers=4,addr=127.0.0.1,port=${FORWARD_S3_NFS_PORT},rw"
      device: ':/'
